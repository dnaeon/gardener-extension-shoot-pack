apiVersion: batch/v1
kind: Job
metadata:
  name: extension-cert-manager-startupapicheck
  namespace: kube-system
  labels:
    app: startupapicheck
    app.kubernetes.io/name: startupapicheck
    app.kubernetes.io/instance: extension
    app.kubernetes.io/component: "startupapicheck"
    app.kubernetes.io/version: "v1.20.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: cert-manager-v1.20.0
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "1"
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: startupapicheck
        app.kubernetes.io/name: startupapicheck
        app.kubernetes.io/instance: extension
        app.kubernetes.io/component: "startupapicheck"
        app.kubernetes.io/version: "v1.20.0"
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: cert-manager-v1.20.0
    spec:
      restartPolicy: OnFailure
      serviceAccountName: extension-cert-manager-startupapicheck
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cert-manager-startupapicheck
          image: "quay.io/jetstack/cert-manager-startupapicheck:v1.20.0"
          imagePullPolicy: IfNotPresent
          args:
          - check
          - api
          - --wait=1m
          - -v
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
      nodeSelector:
        kubernetes.io/os: "linux"
