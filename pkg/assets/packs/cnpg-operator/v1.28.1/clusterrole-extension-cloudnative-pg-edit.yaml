apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: extension-cloudnative-pg-edit
  labels:
    helm.sh/chart: cloudnative-pg-0.27.1
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: extension
    app.kubernetes.io/version: "1.28.1"
    app.kubernetes.io/managed-by: Helm
rules:
- apiGroups:
  - postgresql.cnpg.io
  resources:
  - backups
  - clusters
  - clusters/status
  - databases
  - failoverquorums
  - poolers
  - publications
  - scheduledbackups
  - imagecatalogs
  - clusterimagecatalogs
  - subscriptions
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
