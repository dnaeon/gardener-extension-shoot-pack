apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: extension-cert-manager-startupapicheck:create-cert
  namespace: kube-system
  labels:
    app: startupapicheck
    app.kubernetes.io/name: startupapicheck
    app.kubernetes.io/instance: extension
    app.kubernetes.io/component: "startupapicheck"
    app.kubernetes.io/version: "v1.20.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: cert-manager-v1.20.0
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-cert-manager-startupapicheck:create-cert
subjects:
  - kind: ServiceAccount
    name: extension-cert-manager-startupapicheck
    namespace: kube-system
