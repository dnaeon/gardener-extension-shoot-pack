name: Build and check packs
on:
  push:
    branches-ignore:
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'specs/**'
      - 'pkg/assets/packs/**'

  pull_request:
    paths:
      - 'specs/**'
      - 'pkg/assets/packs/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-packs:
    strategy:
      matrix:
        go-version: [1.26.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
      - name: Build packs
        run: |
          set -eu
          make pack-build
          git diff --exit-code || ( echo 'Packs are out of date, please run "make pack-build"' && exit 1 )
      - name: Verify packs
        run: |
          set -eu
          make pack-verify
          git diff -s --exit-code || ( echo 'Packs failed to verify, please run "make pack-verify"' && exit 1 )
